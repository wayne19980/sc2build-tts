<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarCraft II Replay Analysis Online</title>
    <link rel="icon" type="image/png" href="StarCraft.svg" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap");

      :root {
        --bg-dark: #0d1117;
        --bg-card: #161b22;
        --bg-hover: #21262d;
        --border: #30363d;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --accent-blue: #58a6ff;
        --accent-green: #3fb950;
        --accent-orange: #d29922;
        --accent-red: #f85149;
        --race-t: #74c0fc;
        --race-p: #b197fc;
        --race-z: #69db7c;
        --panel: #161b22;
        --purple: #8e24f1;
        --green: #22c55e;
        --yellow: #eae608;
        --red: #ef4444;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Noto Sans SC",
          -apple-system,
          sans-serif;
        background: var(--bg-dark);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        background: linear-gradient(
          135deg,
          var(--accent-blue),
          var(--accent-green)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .drop-zone {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 3rem 2rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--bg-card);
        margin-bottom: 2rem;
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: var(--accent-blue);
        background: var(--bg-hover);
      }

      .drop-zone .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.7;
      }
      .drop-zone p {
        color: var(--text-muted);
        font-size: 0.95rem;
      }
      .drop-zone .hint {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        opacity: 0.8;
      }

      input[type="file"] {
        display: none;
      }

      .result {
        display: none;
      }
      .result.visible {
        display: block;
      }

      .game-info {
        background: var(--bg-card);
        border-radius: 12px;
        padding: 1rem 1.5rem;
        margin-bottom: 1.5rem;
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
        border: 1px solid var(--border);
      }

      .game-info span {
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      .game-info strong {
        color: var(--accent-blue);
      }

      .build-orders {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }

      .time-mode-toggle {
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .time-mode-toggle select {
        background: var(--bg-card);
        border-radius: 6px;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 0.25rem 0.5rem;
        font-size: 0.85rem;
      }

      .time-mode-toggle label {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        cursor: pointer;
      }

      .chat-toggle-row {
        margin: 0.5rem 0 0.25rem;
        display: flex;
        justify-content: flex-end;
      }

      .chat-toggle-btn {
        background: transparent;
        border-radius: 6px;
        border: 1px solid var(--border);
        color: var(--accent-blue);
        padding: 0.25rem 0.75rem;
        font-size: 0.8rem;
        cursor: pointer;
      }

      .chat-toggle-btn:hover {
        background: var(--bg-hover);
        border-color: var(--accent-blue);
      }

      .chat-panel {
        display: block;
        background: var(--bg-card);
        border-radius: 8px;
        border: 1px solid var(--border);
        padding: 0.75rem 1rem;
        margin-bottom: 1rem;
        max-height: 240px;
        overflow-y: auto;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
      }

      .chat-item {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 0.25rem;
      }

      .chat-item:last-child {
        margin-bottom: 0;
      }

      .chat-time {
        color: var(--text-muted);
      }

      .chat-player {
        color: var(--accent-green);
      }

      .chat-target {
        color: var(--text-muted);
      }

      .chat-text {
        color: var(--text);
      }

      .build-item.upgrade .unit {
        color: var(--accent-red);
      }

      .build-item.upgrade .time {
        color: var(--accent-red);
      }

      .build-item.recall .unit {
        color: var(--accent-blue);
      }

      .build-item.recall .time {
        color: var(--accent-blue);
      }

      /* 单位训练：橙色，建筑保持默认白色 */
      .build-item.unit .unit {
        color: var(--accent-orange);
      }

      @media (max-width: 768px) {
        .build-orders {
          grid-template-columns: 1fr;
        }
      }

      .player-panel {
        background: var(--bg-card);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
      }

      .player-header {
        padding: 1rem 1.25rem;
        font-weight: 600;
        font-size: 1rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .player-header.team1 {
        background: linear-gradient(
          90deg,
          rgba(116, 192, 252, 0.15),
          transparent
        );
      }

      .player-header.team2 {
        background: linear-gradient(
          90deg,
          rgba(249, 81, 73, 0.15),
          transparent
        );
      }

      .race-badge {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 0.85rem;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
      }

      .race-badge.T {
        background: rgba(116, 192, 252, 0.3);
        color: var(--race-t);
      }
      .race-badge.P {
        background: rgba(177, 151, 252, 0.3);
        color: var(--race-p);
      }
      .race-badge.Z {
        background: rgba(105, 219, 124, 0.3);
        color: var(--race-z);
      }

      .player-header .player-name {
        max-width: 200px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .export-btn {
        margin-left: auto;
        padding: 0.2rem 0.75rem;
        font-size: 0.8rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(88, 166, 255, 0.08);
        color: var(--accent-blue);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
      }

      .export-btn::before {
        content: "⇩";
        font-size: 0.9em;
      }

      .export-btn:hover {
        border-color: var(--accent-blue);
        background: rgba(88, 166, 255, 0.2);
      }

      .build-list {
        max-height: 400px;
        overflow-y: auto;
      }

      /* 列表/聊天区域定制滚动条，保持与整体暗色+蓝绿强调色风格统一 */
      .build-list,
      .chat-panel {
        scrollbar-width: thin; /* Firefox */
        scrollbar-color: var(--accent-blue) transparent;
      }

      .build-list::-webkit-scrollbar,
      .chat-panel::-webkit-scrollbar {
        width: 8px;
      }

      .build-list::-webkit-scrollbar-track,
      .chat-panel::-webkit-scrollbar-track {
        background: transparent;
      }

      .build-list::-webkit-scrollbar-thumb,
      .chat-panel::-webkit-scrollbar-thumb {
        background: rgba(88, 166, 255, 0.4);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      .build-list::-webkit-scrollbar-thumb:hover,
      .chat-panel::-webkit-scrollbar-thumb:hover {
        background: rgba(88, 166, 255, 0.8);
      }

      .build-item {
        display: grid;
        grid-template-columns: 60px 50px 1fr;
        gap: 0.75rem;
        padding: 0.5rem 1.25rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        border-bottom: 1px solid var(--border);
        align-items: center;
      }

      .build-item:last-child {
        border-bottom: none;
      }
      .build-item:hover {
        background: var(--bg-hover);
      }
      .build-item .time {
        color: var(--text-muted);
        font-weight: 500;
      }
      .build-item .supply {
        color: var(--accent-orange);
        font-size: 0.8rem;
      }
      .build-item .unit {
        color: var(--text);
      }

      .loading {
        text-align: center;
        padding: 2rem;
        color: var(--text-muted);
        display: none;
      }

      .loading.visible {
        display: block;
      }

      .loading .spinner {
        display: inline-block;
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--accent-blue);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 1rem;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        background: rgba(248, 81, 73, 0.15);
        border: 1px solid var(--accent-red);
        border-radius: 8px;
        padding: 1rem;
        color: var(--accent-red);
        margin-bottom: 1rem;
        display: none;
      }

      .error.visible {
        display: block;
      }

      .init-status {
        text-align: center;
        padding: 1.5rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .init-status .progress {
        margin-top: 1rem;
        color: var(--accent-blue);
      }
      /* Voice Reader Panel */
      .voice-reader-panel {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        width: 400px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        display: none;
        animation: slide-up 0.3s ease-out;
      }

      @keyframes slide-up {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .voice-reader-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .voice-reader-header h3 {
        font-size: 1rem;
        color: var(--accent-blue);
      }

      .voice-reader-close {
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 1.25rem;
      }

      #voice-timer {
        font-family: "JetBrains Mono", monospace;
        font-size: 3rem;
        font-weight: 700;
        color: var(--accent-green);
        text-align: center;
        margin-bottom: 1rem;
      }

      .voice-queue {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
        border: 1px solid var(--border);
      }

      .voice-step {
        font-size: 0.9rem;
        opacity: 0.4;
        height: 1.4rem;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        transition: all 0.2s;
      }

      .voice-step.active {
        opacity: 1;
        font-size: 1.4rem;
        height: 2rem;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 0 10px var(--accent-green);
      }

      .voice-step.past {
        color: var(--text-muted);
        text-decoration: line-through;
      }

      .voice-step-progress {
        width: 100%;
        height: 12px;
        background: var(--bg-dark);
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 0.75rem;
        border: 1px solid var(--border);
      }

      #voice-step-bar {
        width: 0%;
        height: 100%;
        background: var(--accent-green);
        transition: width 0.1s linear;
      }

      .voice-timeline {
        width: 100%;
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        cursor: pointer;
        margin-bottom: 1rem;
        position: relative;
      }

      #voice-timeline-bar {
        width: 0%;
        height: 100%;
        background: var(--text-muted);
        border-radius: 3px;
      }

      .voice-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .voice-btn {
        padding: 0.6rem;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.9rem;
        color: white;
      }

      .voice-btn-play {
        background: #059669;
      }
      .voice-btn-reset {
        background: #7f1d1d;
      }

      .voice-settings {
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .voice-setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .voice-setting-row input[type="range"] {
        width: 100px;
      }

      .voice-setting-row select {
        background: var(--bg-dark);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 4px;
        font-size: 0.75rem;
      }

      .voice-reader-btn {
        margin-left: 0.5rem;
        padding: 0.2rem 0.75rem;
        font-size: 0.8rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(168, 85, 247, 0.08);
        color: var(--purple);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
      }

      .voice-reader-btn:hover {
        border-color: var(--purple);
        background: rgba(168, 85, 247, 0.2);
      }
      .voice-reader-btn {
        background: rgba(168, 85, 247, 0.1);
        color: var(--purple);
        border: 1px solid rgba(168, 85, 247, 0.2);
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 0.75rem;
        cursor: pointer;
        margin-right: 8px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        transition: all 0.2s;
      }
      .voice-reader-btn:hover {
        background: rgba(168, 85, 247, 0.2);
        border-color: var(--purple);
      }
      .voice-reader-btn span {
        font-size: 0.9rem;
      }

      .voice-reader-panel {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 340px;
        background: rgba(22, 27, 34, 0.98);
        border: 1px solid #30363d;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        display: none;
        padding: 18px;
        z-index: 1000;
        color: #e6edf3;
        font-family: "Noto Sans SC", sans-serif;
        backdrop-filter: blur(10px);
      }
      .voice-reader-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
        border-bottom: 1px solid #30363d;
        padding-bottom: 8px;
      }
      .voice-reader-header h3 {
        margin: 0;
        font-size: 0.95rem;
        color: var(--purple);
        line-height: 1.2;
        padding-right: 20px;
      }
      .voice-reader-close {
        background: none;
        border: none;
        color: #8b949e;
        font-size: 1.4rem;
        cursor: pointer;
        line-height: 1;
      }
      #voice-timer {
        text-align: center;
        font-size: 1.8rem;
        font-weight: bold;
        margin: 12px 0;
        color: var(--accent-green);
        font-family: "JetBrains Mono", monospace;
      }
      .voice-queue {
        min-height: 180px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 10px;
        overflow: hidden;
      }
      .voice-step {
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.82rem;
        transition: all 0.2s;
        border: 1px solid transparent;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .voice-step.past {
        color: #484f58;
        opacity: 0.6;
      }
      .voice-step.active {
        background: rgba(168, 85, 247, 0.15);
        border-color: var(--purple);
        color: #fff;
        font-weight: bold;
        font-size: 1rem;
        box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
      }
      .voice-step.future {
        color: #8b949e;
      }
      .voice-step-progress {
        height: 4px;
        background: #21262d;
        border-radius: 2px;
        overflow: hidden;
      }
      #voice-step-bar {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--yellow) 0%,
          var(--green) 33%,
          var(--red) 66%,
          var(--purple) 100%
        );
        background-size: 340px 100%;
        width: 0%;
        transition: width 0.1s linear;
      }
      .voice-timeline {
        height: 8px;
        background: #21262d;
        border-radius: 4px;
        margin: 20px 0;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      #voice-timeline-bar {
        height: 100%;
        background: var(--accent-blue);
        width: 0%;
        border-radius: 4px;
        opacity: 0.5;
      }
      .voice-controls {
        display: flex;
        gap: 12px;
        margin: 15px 0;
      }
      .voice-btn {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.85rem;
        transition: transform 0.1s;
      }
      .voice-btn:active {
        transform: scale(0.98);
      }
      .voice-btn-play {
        background: var(--purple);
        color: white;
      }
      .voice-btn-reset {
        background: #30363d;
        color: #e6edf3;
      }
      #pipBtn {
        background: none;
        border: none;
        color: #8b949e;
        cursor: pointer;
        font-size: 1.25rem;
        padding: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        filter: grayscale(1);
      }
      #pipBtn:hover {
        color: var(--purple);
        filter: grayscale(0);
        transform: scale(1.1);
      }
      .voice-settings {

        border-top: 1px solid #30363d;
        padding-top: 12px;
        font-size: 0.75rem;
        color: #8b949e;
      }
      .voice-setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .voice-setting-row select,
      .voice-setting-row input[type="range"] {
        background: #0d1117;
        border: 1px solid #30363d;
        color: white;
        padding: 2px 5px;
        border-radius: 4px;
      }
      .voice-setting-row input[type="range"] {
        height: 4px;
      }

      .purple {
        --purple: #a855f7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>StarCraft II Replay Analysis - Online</h1>
        <p class="subtitle">修改自ProbiusOfficial/sc2replay_online_analysis</p>
      </header>

      <div class="init-status" id="initStatus">
        <p>正在加载 Python 运行环境...</p>
        <p class="progress" id="initProgress">初始化中</p>
      </div>

      <div class="drop-zone" id="dropZone" style="display: none">
        <div class="icon">📁</div>
        <p>将录像文件拖放到此处，或点击选择文件</p>
        <p class="hint">
          支持 .SC2Replay 格式 · 解析在浏览器内完成，文件不会上传
        </p>
        <input type="file" id="fileInput" accept=".SC2Replay,.sc2replay" />
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在解析录像...</p>
      </div>

      <div class="error" id="error"></div>

      <div class="result" id="result">
        <div class="game-info" id="gameInfo"></div>
        <div class="time-mode-toggle">
          <label>
            <input type="checkbox" id="showOriginal" />
            显示英文名称
          </label>
          <label>
            <input type="checkbox" id="showWorkers" />
            显示农民
          </label>
          <label>
            <input type="checkbox" id="mergeSameActions" />
            合并同一秒重复操作
          </label>
        </div>
        <div class="chat-toggle-row">
          <button id="chatToggle" class="chat-toggle-btn" type="button">
            收起对局聊天
          </button>
        </div>
        <div class="chat-panel" id="chatPanel"></div>
        <div class="build-orders" id="buildOrders"></div>
      </div>

      <!-- Voice Reader Panel -->
      <div class="voice-reader-panel" id="voiceReader">
        <div class="voice-reader-header">
          <h3 id="voice-player-name">Build Order Reader</h3>
          <div style="display: flex; gap: 8px; align-items: center;">
            <button id="pipBtn" title="画中画模式">🖼️</button>
            <button class="voice-reader-close" id="voiceClose">&times;</button>
          </div>
        </div>

            Corruptor: { zh: "腐化", time: 0 },
          },
          CCClist: {
            BanelingBurrowed: { zh: "毒爆", time: 0 },
            RavagerBurrowed: { zh: "火蟑螂", time: 0 },
            Lurker: { zh: "地刺", time: 0 },
            LurkerBurrowed: { zh: "地刺", time: 0 },
          },
        },
      };

      // Voice Reader State
      let voiceSteps = [];
      let voiceCurrentIndex = -1;
      let voiceIsRunning = false;
      let voiceStartTime = 0;
      let voicePausedTime = 0;
      let voiceTimerId = null;
      const synth = window.speechSynthesis;

      // SC2 默认「更快（Faster）」游戏时间与实际显示时间存在约 1.4 倍系数（仅用于单位事件的游戏秒）
      const GAME_TIME_FACTOR = 1.4;

      // SC2 Faster 速度下，游戏内时钟走 1 秒，实际只经过约 0.98 真实秒
      // 测量依据：10 分钟游戏时间 = 35291 帧 / 60fps = 588.18 真实秒，即 588.18/600 ≈ 0.9803
      const SC2_FASTER_REAL_FACTOR = 0.9803;

      // 直接使用真实秒数（例如 replay.game_length.seconds）
      function formatRealTime(seconds) {
        const safe = Math.max(0, Math.round(seconds));
        const m = Math.floor(safe / 60);
        const s = safe % 60;
        return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      // 把游戏内部秒（frame/16）折算成接近游戏内计时的秒数
      function formatGameTime(gameSeconds) {
        const displaySeconds = Math.max(
          0,
          Math.round(gameSeconds / GAME_TIME_FACTOR),
        );
        const m = Math.floor(displaySeconds / 60);
        const s = displaySeconds % 60;
        return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      // 把 Unix 时间戳格式化为本地时间字符串
      function formatRealWorldTime(timestamp) {
        if (!timestamp && timestamp !== 0) return "";
        const d = new Date(timestamp * 1000);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        return `${y}-${m}-${day} ${hh}:${mm}`;
      }

      // 格式化文件大小
      function formatFileSize(bytes) {
        if (bytes === undefined || bytes === null) return "";
        const thresh = 1024;
        if (bytes < thresh) return `${bytes} B`;
        const units = ["KB", "MB", "GB", "TB"];
        let u = -1;
        let size = bytes;
        do {
          size /= thresh;
          ++u;
        } while (size >= thresh && u < units.length - 1);
        return `${size.toFixed(1)} ${units[u]}`;
      }

      function escapeHtml(str) {
        if (str == null) return "";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function showError(msg) {
        error.textContent = msg;
        error.classList.add("visible");
        result.classList.remove("visible");
        loading.classList.remove("visible");
      }

      function hideError() {
        error.classList.remove("visible");
      }

      function setInitStatus(msg) {
        if (initProgress) initProgress.textContent = msg;
      }

      async function loadTranslationData() {
        console.log("translation data loaded from embedded data");
      }

      const PARSE_SCRIPT = `
import json
import sc2reader
from sc2reader.events.message import ChatEvent
import spawningtool.parser

def extract_replay_data(replay_path):
    # Monkey-patch spawningtool to return original unit keys instead of display names
    # This ensures "OrbitalCommand" instead of "Orbital Command"
    def patched_get_display_name(self, unit_name, player):
        return unit_name
    spawningtool.parser.GameParser.get_display_name = patched_get_display_name

    parser = spawningtool.parser.GameParser(replay_path)
    st_data = parser.get_parsed_data()
    replay = parser.replay
    
    start_time_ts = None
    if hasattr(replay, 'start_time'):
        try:
            start_time_ts = int(replay.start_time.timestamp())
        except:
            pass

    result = {
        "map_name": st_data.get("map", "Unknown"),
        "game_length": st_data.get("frames", 0) // st_data.get("frames_per_second", 16),
        "client_version": st_data.get("build"),
        "region": st_data.get("region"),
        "start_time": start_time_ts,
        "winner": None,
        "teams": [],
        "chat": [],
    }

    for ev in getattr(replay, "events", []):
        if isinstance(ev, ChatEvent):
            frame = int(getattr(ev, "frame", 0))
            sec = frame >> 4
            result["chat"].append({
                "time": int(sec),
                "player": getattr(ev.player, "name", ""),
                "pid": getattr(ev, "pid", None),
                "target": getattr(ev, "target", ""),
                "text": getattr(ev, "text", ""),
            })

    winners = []
    for team in getattr(replay, "teams", []):
        if getattr(team, "result", None) == "Win":
            winners.append(" & ".join([p.name for p in team.players]))
    if winners:
        result["winner"] = " / ".join(winners)

    for team in replay.teams:
        team_data = {"players": []}
        for player in team.players:
            st_player = st_data["players"].get(player.pid)
            if not st_player: continue
                
            build_order = []
            for item in st_player.get("buildOrder", []):
                # We can keep _kind for explicit upgrades if Spawningtool has it, 
                # but JS will search all categories anyway.
                build_order.append({
                    "start_time": int(item["frame"]) >> 4,
                    "supply": item["supply"],
                    "unit": item["name"],  # returns the Key
                    "_kind": "upgrade" if item.get("type") == "Upgrade" else "unit",
                    "is_worker": item.get("is_worker", False)
                })
            
            team_data["players"].append({
                "name": player.name,
                "race": (player.pick_race or "?")[0],
                "build_order": build_order,
            })
        result["teams"].append(team_data)
    return result
`;

      async function parseReplayWithPyodide(file) {
        hideError();
        loading.classList.add("visible");
        result.classList.remove("visible");

        const showWorkersCheckbox = document.getElementById("showWorkers");
        const showOriginalCheckbox = document.getElementById("showOriginal");
        const mergeSameActionsCheckbox =
          document.getElementById("mergeSameActions");

        if (showOriginalCheckbox && !showOriginalCheckbox.dataset.listener) {
          showOriginalCheckbox.addEventListener("change", (e) => {
            showOriginal = !!e.target.checked;
            if (lastData) displayResult(lastData);
          });
          showOriginalCheckbox.dataset.listener = "true";
        }

        if (showWorkersCheckbox && !showWorkersCheckbox.dataset.listener) {
          showWorkersCheckbox.addEventListener("change", (e) => {
            showWorkers = !!e.target.checked;
            if (lastData) displayResult(lastData);
          });
          showWorkersCheckbox.dataset.listener = "true";
        }

        if (
          mergeSameActionsCheckbox &&
          !mergeSameActionsCheckbox.dataset.listener
        ) {
          mergeSameActionsCheckbox.addEventListener("change", (e) => {
            mergeSameActions = !!e.target.checked;
            if (lastData) displayResult(lastData);
          });
          mergeSameActionsCheckbox.dataset.listener = "true";
        }

        if (chatToggle && !chatToggle.dataset.listener) {
          chatToggle.addEventListener("click", () => {
            chatVisible = !chatVisible;
            chatPanel.style.display = chatVisible ? "block" : "none";
            chatToggle.textContent = chatVisible
              ? "收起对局聊天"
              : "查看对局聊天";
          });
          chatToggle.dataset.listener = "true";
        }

        try {
          // 记录文件基础信息（目前用于显示录像大小）
          lastFileMeta = {
            name: file.name,
            size: file.size,
          };

          const buffer = await file.arrayBuffer();
          const data = new Uint8Array(buffer);

          pyodide.FS.writeFile("/tmp/replay.SC2Replay", data);

          const parseCode = `
${PARSE_SCRIPT}
result = extract_replay_data("/tmp/replay.SC2Replay")
json.dumps(result)
`;
          const resultJson = await pyodide.runPythonAsync(parseCode);
          const data2 = JSON.parse(resultJson);

          lastData = data2;
          pyodide.FS.unlink("/tmp/replay.SC2Replay");

          displayResult(data2);
        } catch (e) {
          console.error(e);
          showError(e.message || "解析失败，请检查文件格式");
        } finally {
          loading.classList.remove("visible");
        }
      }

      function getDisplayUnitText(item) {
        const name = item.unit || "";
        const kind = item._kind || "";

        if (showOriginal) {
          if (kind === "recall") {
            const target = item.target || name || "";
            return target ? `星空加速 → ${target}` : "星空加速";
          }
          return name;
        }

        if (!translationData) return name;

        // Try to find translation in any category
        let zh = null;

        // Sequence: Check upgrades, units, buildings, changes
        if (translationData.upgrade && translationData.upgrade[name]) {
          zh = translationData.upgrade[name].zh;
        }
        if (!zh && translationData.unit && translationData.unit[name]) {
          zh = translationData.unit[name].zh;
        }
        if (!zh && translationData.build && translationData.build[name]) {
          zh = translationData.build[name].zh;
        }
        if (!zh && translationData.change) {
          for (const group of Object.values(translationData.change)) {
            if (group && group[name]) {
              zh = group[name].zh;
              break;
            }
          }
        }

        return zh || name;
      }

      function renderChat(data) {
        if (!chatPanel || !chatToggle) return;

        const chats = Array.isArray(data.chat) ? [...data.chat] : [];

        if (!chats.length) {
          chatVisible = false;
          chatPanel.style.display = "none";
          chatPanel.innerHTML = "";
          chatToggle.style.display = "none";
          chatToggle.textContent = "查看对局聊天";
          return;
        }

        chats.sort((a, b) => {
          const ta =
            typeof a.time === "number"
              ? a.time
              : typeof a.second === "number"
                ? a.second
                : 0;
          const tb =
            typeof b.time === "number"
              ? b.time
              : typeof b.second === "number"
                ? b.second
                : 0;
          return ta - tb;
        });

        const rows = chats
          .map((msg) => {
            const tRaw =
              typeof msg.time === "number"
                ? msg.time
                : typeof msg.second === "number"
                  ? msg.second
                  : 0;
            const tStr = formatGameTime(tRaw);
            const sender =
              msg.player || (msg.pid != null ? `P${msg.pid}` : "未知玩家");
            const target = msg.target || "所有人";
            const text = escapeHtml(msg.text || "");
            return `
          <div class="chat-item">
            <span class="chat-time">[${tStr}]</span>
            <span class="chat-player">${escapeHtml(sender)}</span>
            <span class="chat-target">(${escapeHtml(target)})</span>
            <span class="chat-text">${text}</span>
          </div>
        `;
          })
          .join("");

        chatPanel.innerHTML = rows;
        chatToggle.style.display = "inline-flex";

        // Default expanded
        chatVisible = true;
        chatPanel.style.display = "block";
        chatToggle.textContent = "收起对局聊天";
      }

      // 判断某个条目是否属于「初始化事件」
      // 简化规则：仅在 start_time 与 finish_time（或 time）都为 0 时视为初始化事件。
      function isInitEvent(item, race) {
        if (!item) return false;

        // 0) start_time == finish_time == 0 的单位，一律视为初始化事件
        const start0 =
          typeof item.start_time === "number" ? item.start_time : 0;
        const finish0 =
          typeof item.finish_time === "number" ? item.finish_time : start0;
        if (start0 === 0 && finish0 === 0) {
          return true;
        }
        return false;
      }

      function displayResult(data) {
        const gameLen = data.game_length || 0;
        const clientVersion = data.client_version || "";
        const region = data.region || "";
        const startTs = data.start_time || null;
        const winner = data.winner || "";
        const startStr = startTs ? formatRealWorldTime(startTs) : "";
        const fileSizeStr = lastFileMeta
          ? formatFileSize(lastFileMeta.size)
          : "";

        const infoParts = [];
        infoParts.push(
          `<span><strong>地图</strong> ${data.map_name || "Unknown"}</span>`,
        );
        infoParts.push(
          `<span><strong>时长</strong> ${formatRealTime(gameLen)}</span>`,
        );
        if (clientVersion)
          infoParts.push(`<span><strong>版本</strong> ${clientVersion}</span>`);
        if (region)
          infoParts.push(`<span><strong>区域</strong> ${region}</span>`);
        if (startStr)
          infoParts.push(`<span><strong>时间</strong> ${startStr}</span>`);
        if (winner)
          infoParts.push(`<span><strong>胜者</strong> ${winner}</span>`);
        if (fileSizeStr)
          infoParts.push(`<span><strong>大小</strong> ${fileSizeStr}</span>`);

        gameInfo.innerHTML = infoParts.join("");
        renderChat(data);

        let html = "";
        const teamClasses = ["team1", "team2"];
        data.teams.forEach((team, i) => {
          team.players.forEach((player) => {
            const race = (player.race || "?")[0].toUpperCase();
            let items = [...(player.build_order || [])];

            // Filter workers if requested
            if (!showWorkers) {
              items = items.filter((it) => !it.is_worker);
            }

            // Merge same second actions
            let processedItems = items.map((it) => ({
              timeStr: formatGameTime(it.start_time),
              supplyStr: it.supply ?? "",
              unitText: getDisplayUnitText(it),
              extraClass: it.is_worker
                ? "unit"
                : it._kind === "upgrade"
                  ? "upgrade"
                  : it.category === "unit"
                    ? "unit"
                    : "",
              raw: it,
            }));

            if (mergeSameActions) {
              const merged = [];
              let current = null;
              let count = 0;
              const flush = () => {
                if (!current) return;
                merged.push({
                  ...current,
                  unitText:
                    count > 1
                      ? `${current.unitText} x${count}`
                      : current.unitText,
                });
              };
              processedItems.forEach((item) => {
                if (
                  !current ||
                  current.timeStr !== item.timeStr ||
                  current.unitText !== item.unitText
                ) {
                  flush();
                  current = item;
                  count = 1;
                } else {
                  count++;
                  current.supplyStr = item.supplyStr;
                }
              });
              flush();
              processedItems = merged;
            }

            html += `
            <div class="player-panel">
              <div class="player-header ${teamClasses[i]}">
                <span class="race-badge ${race}">${race}</span>
                <span class="player-name">${player.name || "Unknown"}</span>
                <button type="button" class="export-btn">导出TXT</button>
              </div>
              <div class="build-list">
                ${processedItems
                  .map(
                    (it) => `
                  <div class="build-item ${it.extraClass}">
                    <span class="time">${it.timeStr}</span>
                    <span class="supply">${it.supplyStr}</span>
                    <span class="unit">${it.unitText}</span>
                  </div>
                `,
                  )
                  .join("")}
              </div>
            </div>
          `;
          });
        });

        buildOrders.innerHTML = html;
        result.classList.add("visible");
        setupExportButtons();
        setupVoiceButtons(data);

        // If voice reader is already open, refresh its steps to match new options
        if (voiceReader.style.display === "block" && currentVoicePlayer) {
          openVoiceReader(currentVoicePlayer);
        }
      }

      let currentVoicePlayer = null;

      // Voice Reader Implementation
      const voiceReader = document.getElementById("voiceReader");
      const voiceClose = document.getElementById("voiceClose");
      const voicePlayBtn = document.getElementById("voicePlay");
      const voiceResetBtn = document.getElementById("voiceReset");
      const voiceTimer = document.getElementById("voiceTimer");
      const voiceStepBar = document.getElementById("voice-step-bar");
      const voiceTimelineBar = document.getElementById("voice-timeline-bar");
      const voiceTimeline = document.getElementById("voiceTimeline");
      const voiceRateInput = document.getElementById("voiceRate");
      const voiceLangSelect = document.getElementById("voiceLang");
      const voicePlayerName = document.getElementById("voice-player-name");
      const pipBtn = document.getElementById("pipBtn");
      
      let pipWindow = null;


      const vQ_2 = document.getElementById("v-q-2");
      const vQ_1 = document.getElementById("v-q-1");
      const vQ0 = document.getElementById("v-q0");
      const vQ1 = document.getElementById("v-q1");
      const vQ2 = document.getElementById("v-q2");

      function setupVoiceButtons(data) {
        const panels = buildOrders.querySelectorAll(".player-panel");
        panels.forEach((panel, index) => {
          const header = panel.querySelector(".player-header");
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "voice-reader-btn";
          btn.innerHTML = "<span>🔊</span>语音播报";

          // Find player data
          let pData = null;
          let count = 0;
          for (const team of data.teams) {
            for (const player of team.players) {
              if (count === index) {
                pData = player;
                break;
              }
              count++;
            }
            if (pData) break;
          }

          btn.onclick = () => {
            openVoiceReader(pData);
          };
          header.insertBefore(btn, header.querySelector(".export-btn"));
        });
      }

      function openVoiceReader(player) {
        if (!player) return;
        currentVoicePlayer = player;
        voicePlayerName.textContent = `Build Order Reader - ${player.name}`;

        // Prepare steps for voice reader (synchronized with main list options)
        let items = [...(player.build_order || [])];
        if (!showWorkers) {
          items = items.filter((it) => !it.is_worker);
        }

        let processedItems = items.map((it) => ({
          // 先将游戏内帧秒转为游戏显示秒（÷ GAME_TIME_FACTOR），
          // 再乘以 SC2_FASTER_REAL_FACTOR，换算成真实经过的秒数，
          // 这样 TTS 计时器（使用 Date.now() 的真实时间）能与游戏内时钟同步
          time: (it.start_time / GAME_TIME_FACTOR) * SC2_FASTER_REAL_FACTOR,
          text: getDisplayUnitText(it),
        }));

        if (mergeSameActions) {
          const merged = [];
          let current = null;
          let count = 0;
          const flush = () => {
            if (!current) return;
            merged.push({
              ...current,
              text: count > 1 ? `${current.text} ×${count}` : current.text,
            });
          };
          processedItems.forEach((item) => {
            if (
              !current ||
              current.time !== item.time ||
              current.text !== item.text
            ) {
              flush();
              current = item;
              count = 1;
            } else {
              count++;
            }
          });
          flush();
          processedItems = merged;
        }

        voiceSteps = processedItems.map((it) => {
          // Optimize for speech: remove leading digits or brackets
          const speech = it.text.replace(/^\d+\s+/, "").replace(/\[.*?s\]/, "");
          return {
            time: it.time,
            text: it.text,
            speech: speech,
          };
        });

        resetVoice();
        voiceReader.style.display = "block";
      }

      voiceClose.onclick = () => {
        stopVoice();
        voiceReader.style.display = "none";
      };

      function speak(content) {
        if (!content) return;
        const utter = new SpeechSynthesisUtterance(content);
        utter.volume = 1;
        utter.rate = parseFloat(voiceRateInput.value);
        utter.lang = voiceLangSelect.value;
        synth.speak(utter);
      }

      function updateVoiceUI(currentTime) {
        // currentTime 是真实经过的秒数（来自 Date.now()），
        // 除以 SC2_FASTER_REAL_FACTOR 换算回游戏内时钟秒数，
        // 使 timer 显示值与游戏界面左上角的时钟保持一致
        const gameClockSeconds = Math.round(
          currentTime / SC2_FASTER_REAL_FACTOR,
        );
        const m = Math.floor(gameClockSeconds / 60)
          .toString()
          .padStart(2, "0");
        const s = Math.floor(gameClockSeconds % 60)
          .toString()
          .padStart(2, "0");
        document.getElementById("voice-timer").innerText = `${m}:${s}`;

        vQ_2.innerText =
          voiceCurrentIndex > 1 ? voiceSteps[voiceCurrentIndex - 2].text : "";
        vQ_1.innerText =
          voiceCurrentIndex > 0 ? voiceSteps[voiceCurrentIndex - 1].text : "";
        vQ0.innerText =
          voiceCurrentIndex === -1
            ? "准备就绪"
            : voiceSteps[voiceCurrentIndex].text;
        vQ1.innerText = voiceSteps[voiceCurrentIndex + 1]
          ? voiceSteps[voiceCurrentIndex + 1].text
          : "";
        vQ2.innerText = voiceSteps[voiceCurrentIndex + 2]
          ? voiceSteps[voiceCurrentIndex + 2].text
          : "";

        if (voiceSteps.length) {
          const totalTime = voiceSteps[voiceSteps.length - 1].time + 10;
          voiceTimelineBar.style.width = (currentTime / totalTime) * 100 + "%";
        }
      }

      function updateVoice() {
        if (!voiceIsRunning) return;
        const now = (Date.now() - voiceStartTime) / 1000;

        for (let i = 0; i < voiceSteps.length; i++) {
          if (now >= voiceSteps[i].time && voiceCurrentIndex < i) {
            voiceCurrentIndex = i;
            speak(voiceSteps[i].speech);
            updateVoiceUI(now);
          }
        }

        if (voiceCurrentIndex < voiceSteps.length - 1) {
          const nextTime = voiceSteps[voiceCurrentIndex + 1].time;
          const prevTime =
            voiceCurrentIndex === -1 ? 0 : voiceSteps[voiceCurrentIndex].time;
          const percent = ((now - prevTime) / (nextTime - prevTime)) * 100;
          voiceStepBar.style.width = Math.max(0, Math.min(100, percent)) + "%";
        } else {
          voiceStepBar.style.width = "100%";
        }

        updateVoiceUI(now);
        voiceTimerId = requestAnimationFrame(updateVoice);
      }

      function jumpVoiceTo(targetTime) {
        synth.cancel();
        voicePausedTime = Math.max(0, targetTime);
        voiceStartTime = Date.now() - voicePausedTime * 1000;
        voiceCurrentIndex = -1;
        for (let i = 0; i < voiceSteps.length; i++) {
          if (voicePausedTime >= voiceSteps[i].time) voiceCurrentIndex = i;
          else break;
        }
        updateVoiceUI(voicePausedTime);
        if (voiceIsRunning && voiceCurrentIndex !== -1)
          speak(voiceSteps[voiceCurrentIndex].speech);
      }

      function toggleVoicePlay() {
        if (voiceIsRunning) {
          voiceIsRunning = false;
          voicePausedTime = (Date.now() - voiceStartTime) / 1000;
          cancelAnimationFrame(voiceTimerId);
          voicePlayBtn.innerText = "继续 (Alt+↑)";
          synth.pause();
        } else {
          voiceStartTime = Date.now() - voicePausedTime * 1000;
          voiceIsRunning = true;
          updateVoice();
          voicePlayBtn.innerText = "暂停 (Alt+↑)";
          synth.resume();
        }
      }

      function resetVoice() {
        voiceIsRunning = false;
        voicePausedTime = 0;
        voiceCurrentIndex = -1;
        cancelAnimationFrame(voiceTimerId);
        synth.cancel();
        voiceStepBar.style.width = "0%";
        voicePlayBtn.innerText = "开始 (Alt+↑)";
        updateVoiceUI(0);
      }

      function stopVoice() {
        voiceIsRunning = false;
        cancelAnimationFrame(voiceTimerId);
        synth.cancel();
      }

      voicePlayBtn.onclick = toggleVoicePlay;
      voiceResetBtn.onclick = resetVoice;

      async function requestPiP() {
        if ("documentPictureInPicture" in window) {
          try {
            if (pipWindow) {
              pipWindow.close();
              return;
            }

            pipWindow = await window.documentPictureInPicture.requestWindow({
              width: 340,
              height: 400,
            });

            // Set background color for PiP window body
            pipWindow.document.body.style.background = "#0d1117";
            pipWindow.document.body.style.padding = "0";
            pipWindow.document.body.style.margin = "0";
            pipWindow.document.body.style.overflow = "hidden";

            // Copy styles
            Array.from(document.styleSheets).forEach((sheet) => {
              try {
                const rules = Array.from(sheet.cssRules)
                  .map((r) => r.cssText)
                  .join("");
                const style = document.createElement("style");
                style.textContent = rules;
                pipWindow.document.head.appendChild(style);
              } catch (e) {
                const link = document.createElement("link");
                if (sheet.href) {
                  link.rel = "stylesheet";
                  link.href = sheet.href;
                  pipWindow.document.head.appendChild(link);
                }
              }
            });

            // Move panels
            const originalParent = voiceReader.parentElement;
            const originalSibling = voiceReader.nextElementSibling;
            pipWindow.document.body.appendChild(voiceReader);

            // Hide PiP button in the window to avoid nesting
            pipBtn.style.display = "none";

            // Style for PiP
            voiceReader.style.position = "static";
            voiceReader.style.width = "100%";
            voiceReader.style.height = "100%";
            voiceReader.style.boxShadow = "none";
            voiceReader.style.border = "none";
            voiceReader.style.background = "transparent";

            pipWindow.addEventListener(
              "pagehide",
              () => {
                if (originalParent) {
                  if (originalSibling)
                    originalParent.insertBefore(voiceReader, originalSibling);
                  else originalParent.appendChild(voiceReader);
                }
                // Restore styles
                voiceReader.style.position = "fixed";
                voiceReader.style.bottom = "20px";
                voiceReader.style.right = "20px";
                voiceReader.style.width = "340px";
                voiceReader.style.boxShadow = "0 10px 40px rgba(0, 0, 0, 0.6)";
                voiceReader.style.border = "1px solid #30363d";
                voiceReader.style.background = "rgba(22, 27, 34, 0.98)";
                pipBtn.style.display = "inline-flex";
                pipWindow = null;
              },
              { once: true },
            );
          } catch (err) {
            console.error("Document PiP failed", err);
            requestVideoPiP();
          }
        } else {
          requestVideoPiP();
        }
      }

      async function requestVideoPiP() {
        const canvas = document.createElement("canvas");
        canvas.width = 340;
        canvas.height = 180;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        const video = document.createElement("video");
        video.muted = true;
        video.srcObject = canvas.captureStream();
        await video.play();

        document.body.appendChild(video);
        video.style.position = "fixed";
        video.style.top = "-1000px";

        const draw = () => {
          if (!video.srcObject) return;

          ctx.fillStyle = "#0d1117";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Timer
          ctx.fillStyle = "#3fb950";
          ctx.font = 'bold 36px "JetBrains Mono", monospace';
          ctx.textAlign = "center";
          ctx.fillText(voiceTimer.innerText, canvas.width / 2, 60);

          // Step
          ctx.fillStyle = "#e6edf3";
          ctx.font = 'bold 24px "Noto Sans SC", sans-serif';
          ctx.fillText(vQ0.innerText, canvas.width / 2, 110);

          // Next
          ctx.fillStyle = "#8b949e";
          ctx.font = '16px "Noto Sans SC", sans-serif';
          ctx.fillText("Next: " + (vQ1.innerText || "---"), canvas.width / 2, 150);

          if (video.readyState >= 2) {
            requestAnimationFrame(draw);
          }
        };
        draw();

        try {
          await video.requestPictureInPicture();
          video.onleavepictureinpicture = () => video.remove();
        } catch (err) {
          console.error("Video PiP failed", err);
          alert("浏览器不支持画中画模式");
        }
      }

      pipBtn.onclick = requestPiP;


      voiceTimeline.onclick = function (e) {
        if (!voiceSteps.length) return;
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const percentage = x / rect.width;
        const totalTime = voiceSteps[voiceSteps.length - 1].time + 10;
        jumpVoiceTo(totalTime * percentage);
      };

      window.onkeydown = (e) => {
        if (e.altKey) {
          if (e.key === "ArrowUp") {
            e.preventDefault();
            toggleVoicePlay();
          }
          if (e.key === "ArrowDown") {
            e.preventDefault();
            resetVoice();
          }
          if (e.key === "ArrowRight") {
            e.preventDefault();
            const nextIdx = voiceCurrentIndex + 1;
            if (nextIdx < voiceSteps.length)
              jumpVoiceTo(voiceSteps[nextIdx].time);
          }
          if (e.key === "ArrowLeft") {
            e.preventDefault();
            const prevIdx = voiceCurrentIndex - 1;
            if (prevIdx >= 0) jumpVoiceTo(voiceSteps[prevIdx].time);
            else resetVoice();
          }
        }
      };

      function setupExportButtons() {
        const panels = buildOrders.querySelectorAll(".player-panel");
        panels.forEach((panel) => {
          const btn = panel.querySelector(".export-btn");
          if (!btn) return;
          btn.onclick = () => {
            const items = panel.querySelectorAll(".build-item");
            const lines = [];
            items.forEach((item) => {
              const timeEl = item.querySelector(".time");
              const supplyEl = item.querySelector(".supply");
              const unitEl = item.querySelector(".unit");
              const t = timeEl ? timeEl.textContent.trim() : "";
              const s = supplyEl ? supplyEl.textContent.trim() : "";
              const u = unitEl ? unitEl.textContent.trim() : "";
              if (!t && !s && !u) return;
              const parts = [];
              if (t) parts.push(t);
              if (s) parts.push(s);
              if (u) parts.push(u);
              lines.push(parts.join(" "));
            });

            const nameEl = panel.querySelector(".player-name");
            const playerName = nameEl
              ? nameEl.textContent.trim() || "player"
              : "player";
            const content = lines.join("\n");
            const blob = new Blob([content], {
              type: "text/plain;charset=utf-8",
            });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${playerName}_build.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          };
        });
      }

      async function initPyodide() {
        try {
          setInitStatus("加载 Pyodide 运行时...");
          const indexURL = `https://cdn.jsdelivr.net/pyodide/v${PYODIDE_VERSION}/full/`;
          pyodide = await loadPyodide({ indexURL });

          setInitStatus("安装 mpyq（从源码）...");
          const mpyqResp = await fetch(
            "https://cdn.jsdelivr.net/gh/eagleflo/mpyq@master/mpyq.py",
          );
          if (!mpyqResp.ok)
            throw new Error("mpyq 下载失败: " + mpyqResp.status);
          const mpyqCode = await mpyqResp.text();
          pyodide.FS.mkdirTree("/tmp");
          pyodide.FS.writeFile(
            "/tmp/mpyq.py",
            new TextEncoder().encode(mpyqCode),
          );
          await pyodide.runPythonAsync(`
import sys
sys.path.insert(0, "/tmp")
import mpyq
`);

          setInitStatus("安装 sc2reader & spawningtool...");
          await pyodide.loadPackage("micropip");
          await pyodide.runPythonAsync(`
import micropip
await micropip.install('sc2reader', deps=False)
await micropip.install('spawningtool', deps=False)
`);

          initStatus.style.display = "none";
          dropZone.style.display = "block";
        } catch (e) {
          console.error(e);
          setInitStatus("");
          initStatus.innerHTML = `<p style="color:var(--accent-red)">初始化失败: ${e.message}</p><p style="margin-top:0.5rem;font-size:0.85rem">请检查网络连接后刷新重试。若为依赖安装失败，可尝试使用后端版本。</p>`;
        }
      }

      dropZone.addEventListener("click", () => fileInput.click());

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
      });

      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file && file.name.toLowerCase().endsWith(".sc2replay")) {
          parseReplayWithPyodide(file);
        } else {
          showError("请上传 .SC2Replay 文件");
        }
      });

      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) parseReplayWithPyodide(file);
        e.target.value = "";
      });

      // 并行初始化翻译数据与 Pyodide 环境
      loadTranslationData();
      initPyodide();
    </script>
  </body>
</html>
